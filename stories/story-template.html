<!DOCTYPE html>
<html lang="hi" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{STORY_TITLE}} — AntarVasna Pur</title>
  <meta name="description" content="{{STORY_EXCERPT}}">
  <link rel="canonical" href="https://antarvasnapur.in/stories/{{STORY_SLUG}}.html">
  <meta property="og:title" content="{{STORY_TITLE}} — AntarVasna Pur">
  <meta property="og:description" content="{{STORY_EXCERPT}}">
  <meta property="og:type" content="article">
  <meta property="og:url" content="https://antarvasnapur.in/stories/{{STORY_SLUG}}.html">
  <meta name="twitter:card" content="summary">
  <link rel="stylesheet" href="/css/style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": "{{STORY_TITLE}}",
    "description": "{{STORY_EXCERPT}}",
    "datePublished": "{{STORY_DATE}}",
    "author": {"@type": "Organization", "name": "AntarVasna Pur"},
    "publisher": {"@type": "Organization", "name": "AntarVasna Pur", "url": "https://antarvasnapur.in"}
  }
  </script>
</head>
<body>

<div class="container" style="max-width:900px;">

  <!-- Breadcrumb -->
  <nav class="breadcrumb" style="padding-top:24px;">
    <a href="/">होम</a><span>›</span>
    <a href="/category.html?cat={{STORY_CAT}}">{{STORY_CAT_NAME}}</a><span>›</span>
    <span>{{STORY_TITLE}}</span>
  </nav>

  <!-- Story Header -->
  <article class="story-full">
    <header class="story-header">
      <div class="story-cats">
        {{STORY_CATS_HTML}}
      </div>
      <h1 class="story-title">{{STORY_TITLE}}</h1>
      <div class="story-meta-bar">
        <span>📅 {{STORY_DATE}}</span>
        <span>👁 {{STORY_VIEWS}} बार पढ़ी गई</span>
        <span>⏱ {{STORY_READ_TIME}} मिनट पढ़ने का समय</span>
        <span>⭐ {{STORY_RATING}}/5</span>
      </div>
      <div class="story-actions">
        <button class="action-btn" id="bookmark-btn" data-slug="{{STORY_SLUG}}">🔖 बुकमार्क</button>
        <button class="action-btn" data-random>🎲 यादृच्छिक</button>
      </div>
    </header>

    <!-- Story Body -->
    <div class="story-body">
      {{STORY_CONTENT}}
    </div>

    <!-- Tags -->
    <div class="story-tags" style="margin-top:32px;padding-top:20px;border-top:1px solid var(--border);">
      <strong style="font-size:.85rem;color:var(--text-light);">टैग:</strong>
      {{STORY_TAGS_HTML}}
    </div>

    <!-- Rating -->
    <div class="rating-widget" id="rating-widget" data-slug="{{STORY_SLUG}}" style="margin-top:28px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;">
      <p style="font-weight:600;margin-bottom:10px;">इस कहानी को रेट करें</p>
      <div class="stars" id="story-stars">
        <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
      </div>
    </div>

    <!-- Story Nav -->
    <div class="story-nav" style="margin-top:36px;" id="story-nav">
      <div class="loading" style="padding:20px 0"><div class="spinner"></div></div>
    </div>
  </article>

  <!-- Related Stories -->
  <section class="mb-8">
    <div class="section-header"><h2 class="section-title">संबंधित कहानियाँ</h2></div>
    <div class="cards-grid" id="related-stories">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </section>

</div>

<script src="/js/main.js"></script>
<script src="/js/layout.js"></script>
<script src="/js/bookmarks.js"></script>
<script src="/js/rating.js"></script>
<script src="/js/related.js"></script>
<script>
const STORY_SLUG = '{{STORY_SLUG}}';
const STORY_CAT  = '{{STORY_CAT}}';

// Story navigation (prev / next)
async function buildStoryNav() {
  const data = await window.APP.loadStories();
  const sorted = [...data.stories].sort((a,b) => new Date(b.date)-new Date(a.date));
  const idx = sorted.findIndex(s => s.slug === STORY_SLUG);
  const prev = idx < sorted.length-1 ? sorted[idx+1] : null;
  const next = idx > 0 ? sorted[idx-1] : null;
  document.getElementById('story-nav').innerHTML = `
    <div class="story-nav-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      ${prev ? `<a class="nav-card" href="/stories/${prev.slug}.html" style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-decoration:none;display:block;"><span style="font-size:.75rem;color:var(--text-light);display:block;margin-bottom:4px;">← पिछली कहानी</span><span style="font-size:.9rem;font-weight:600;color:var(--text);">${prev.title}</span></a>` : '<div></div>'}
      ${next ? `<a class="nav-card" href="/stories/${next.slug}.html" style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-decoration:none;display:block;text-align:right;"><span style="font-size:.75rem;color:var(--text-light);display:block;margin-bottom:4px;">अगली कहानी →</span><span style="font-size:.9rem;font-weight:600;color:var(--text);">${next.title}</span></a>` : '<div></div>'}
    </div>`;
}
document.addEventListener('DOMContentLoaded', buildStoryNav);
</script>

</body>
</html>
