<!DOCTYPE html>
<html lang="hi" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{STORY_TITLE}} — AntarVasna Pur</title>
  <meta name="description" content="{{STORY_EXCERPT}}">
  <link rel="canonical" href="https://antarvasnapur.in/stories/{{STORY_SLUG}}.html">
  <meta property="og:title" content="{{STORY_TITLE}} — AntarVasna Pur">
  <meta property="og:description" content="{{STORY_EXCERPT}}">
  <meta property="og:type" content="article">
  <meta property="og:url" content="https://antarvasnapur.in/stories/{{STORY_SLUG}}.html">
  <meta name="twitter:card" content="summary">
  <link rel="stylesheet" href="/css/style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": "{{STORY_TITLE}}",
    "description": "{{STORY_EXCERPT}}",
    "datePublished": "{{STORY_DATE}}",
    "author": {"@type": "Organization", "name": "AntarVasna Pur"},
    "publisher": {"@type": "Organization", "name": "AntarVasna Pur", "url": "https://antarvasnapur.in"}
  }
  </script>
  <style>
    .story-container { max-width: 860px; margin: 0 auto; padding: 0 16px 80px; }
    .story-breadcrumb { padding: 20px 0 0; font-size: 0.82rem; color: var(--text-light); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .story-breadcrumb a { color: var(--text-light); }
    .story-breadcrumb a:hover { color: var(--accent); }
    .story-breadcrumb .sep { color: var(--border); }
    .story-breadcrumb .current { color: var(--text); font-weight: 500; }
    .story-full { margin-top: 28px; }
    .story-cats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .cat-pill { display: inline-block; padding: 3px 12px; background: rgba(192,57,43,0.09); color: var(--accent); border-radius: 50px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .cat-pill:hover { background: var(--accent); color: #fff; }
    .story-title { font-family: var(--font-heading); font-size: clamp(1.6rem,4vw,2.4rem); color: var(--text); line-height: 1.2; margin-bottom: 16px; }
    .story-meta-bar { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; font-size: 0.82rem; color: var(--text-light); padding: 12px 0; border-top: 1px solid var(--border-light); border-bottom: 1px solid var(--border-light); margin-bottom: 20px; }
    .story-meta-bar span { display: flex; align-items: center; gap: 4px; }
    .story-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 28px; }
    .story-body { font-family: var(--font-heading); font-size: 1.1rem; line-height: 2; color: var(--text); }
    .story-body p { margin-bottom: 1.4em; }
    .story-tags { margin-top: 28px; padding-top: 18px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .story-tags strong { font-size: 0.8rem; color: var(--text-light); }
    .tag { display: inline-block; padding: 4px 12px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 50px; font-size: 0.78rem; color: var(--text-muted); }
    .tag:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .story-nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 32px; }
    @media (max-width: 480px) { .story-nav-grid { grid-template-columns: 1fr; } }
    .nav-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; text-decoration: none; display: block; transition: border-color 0.2s, box-shadow 0.2s; }
    .nav-card:hover { border-color: var(--accent); box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .nav-card .nav-lbl { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-light); display: block; margin-bottom: 4px; }
    .nav-card .nav-t { font-size: 0.9rem; font-weight: 600; color: var(--text); font-family: var(--font-heading); }
  </style>
</head>
<body>

<div class="story-container">

  <nav class="story-breadcrumb">
    <a href="/">होम</a>
    <span class="sep">›</span>
    <a href="/category.html?cat={{STORY_CAT}}">{{STORY_CAT_NAME}}</a>
    <span class="sep">›</span>
    <span class="current">{{STORY_TITLE}}</span>
  </nav>

  <article class="story-full">

    <div class="story-cats">{{STORY_CATS_HTML}}</div>

    <h1 class="story-title">{{STORY_TITLE}}</h1>

    <div class="story-meta-bar">
      <span>📅 {{STORY_DATE}}</span>
      <span>👁 {{STORY_VIEWS}} बार पढ़ी गई</span>
      <span>⏱ {{STORY_READ_TIME}} मिनट</span>
      <span>⭐ {{STORY_RATING}}/5</span>
    </div>

    <div class="story-actions">
      <button class="action-btn" id="bookmark-btn" data-slug="{{STORY_SLUG}}">🔖 बुकमार्क</button>
      <button class="action-btn" data-random>🎲 यादृच्छिक</button>
    </div>

    <div class="story-body">
      {{STORY_CONTENT}}
    </div>

    <div class="story-tags">
      <strong>टैग:</strong>
      {{STORY_TAGS_HTML}}
    </div>

    <div style="margin-top:28px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;">
      <p style="font-weight:600;font-size:.9rem;margin-bottom:10px;color:var(--text);">इस कहानी को रेट करें</p>
      <div id="story-stars" style="display:flex;gap:6px;cursor:pointer;font-size:1.6rem;color:var(--border);">
        <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
      </div>
    </div>

    <div id="story-nav-wrap"></div>

  </article>

  <section style="margin-top:40px;">
    <div class="section-header"><h2 class="section-title">संबंधित कहानियाँ</h2></div>
    <div class="cards-grid" id="related-stories"><div class="loading"><div class="spinner"></div></div></div>
  </section>

</div>

<script src="/js/main.js"></script>
<script src="/js/layout.js"></script>
<script src="/js/bookmarks.js"></script>
<script src="/js/rating.js"></script>
<script src="/js/related.js"></script>
<script>
const STORY_SLUG = '{{STORY_SLUG}}';

// Star rating interactive
(function(){
  const stars = document.querySelectorAll('#story-stars span');
  const KEY = 'rating_' + STORY_SLUG;
  const saved = parseInt(localStorage.getItem(KEY) || '0');
  function paint(n) { stars.forEach((s,i) => s.style.color = i < n ? '#f39c12' : 'var(--border)'); }
  paint(saved);
  stars.forEach((s,i) => {
    s.addEventListener('mouseenter', () => paint(i+1));
    s.addEventListener('mouseleave', () => paint(saved));
    s.addEventListener('click', () => {
      localStorage.setItem(KEY, i+1);
      paint(i+1);
    });
  });
})();

// Story prev/next navigation
async function buildStoryNav() {
  const data = await window.APP.loadStories();
  const sorted = [...data.stories].sort((a,b) => new Date(b.date)-new Date(a.date));
  const idx = sorted.findIndex(s => s.slug === STORY_SLUG);
  const prev = idx < sorted.length-1 ? sorted[idx+1] : null;
  const next = idx > 0 ? sorted[idx-1] : null;
  const wrap = document.getElementById('story-nav-wrap');
  if (!wrap) return;
  wrap.innerHTML = `<div class="story-nav-grid">
    ${prev ? `<a class="nav-card" href="/stories/${prev.slug}.html"><span class="nav-lbl">← पिछली कहानी</span><span class="nav-t">${prev.title}</span></a>` : '<div></div>'}
    ${next ? `<a class="nav-card" href="/stories/${next.slug}.html" style="text-align:right;"><span class="nav-lbl">अगली कहानी →</span><span class="nav-t">${next.title}</span></a>` : '<div></div>'}
  </div>`;
}

document.addEventListener('DOMContentLoaded', buildStoryNav);
</script>

</body>
</html>
