<!DOCTYPE html>
<html lang="hi" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/style.css">
  <title id="page-title">श्रेणी — AntarVasna Pur</title>
  <meta name="description" id="page-desc" content="श्रेणी के अनुसार हिंदी कहानियाँ — AntarVasna Pur">
  <link rel="canonical" href="https://antarvasnapur.in/category.html">
</head>
<body>

<section class="page-hero">
  <h1 id="cat-title">श्रेणी</h1>
  <p id="cat-desc">इस श्रेणी की सभी कहानियाँ</p>
</section>
<div class="container">
  <div class="layout-grid">
    <main>
      <div class="stories-grid" id="category-results"><div class="loading"><div class="spinner"></div>लोड हो रहा है...</div></div>
      <div class="pagination" id="cat-pagination"></div>
    </main>
    <aside class="sidebar">
      <div class="sidebar-widget"><h3 class="widget-title">📂 सभी श्रेणियाँ</h3><ul class="cat-list" id="sidebar-categories"></ul></div>
      <div class="sidebar-widget"><h3 class="widget-title">🏷️ टैग</h3><div class="tags-cloud" id="sidebar-tags"></div></div>
      <div class="sidebar-widget"><button class="btn-random" data-random>🎲 यादृच्छिक कहानी</button></div>
    </aside>
  </div>
</div>

<script src="/js/main.js"></script>
<script src="/js/layout.js"></script>
<script src="/js/pagination.js"></script>
<script src="/js/categories.js"></script>
<script src="/js/tags.js"></script>
<script>
const cat = new URLSearchParams(window.location.search).get('cat') || '';
if (cat) {
  const t = cat.charAt(0).toUpperCase() + cat.slice(1);
  document.getElementById('page-title').textContent = t + ' कहानियाँ — AntarVasna Pur';
}
</script>
</body>
</html>
